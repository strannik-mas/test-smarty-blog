version: '3.9'

services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: test_smarty_app
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - mysql

  mysql:
    image: mysql:8
    container_name: test_smarty_mysql
    restart: always
    environment:
      MYSQL_DATABASE: test_smarty
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user1
      MYSQL_PASSWORD: qwerty12345
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: